# Veronum Desktop — electron-builder config.
#
# Mac signing assumes you already have a Developer ID Application cert
# in Keychain (the user confirmed they do). The notarize step uses
# Apple's notarytool — set these env vars before `npm run dist:mac`:
#
#   APPLE_ID                — your Apple ID email
#   APPLE_APP_SPECIFIC_PASSWORD — generate at appleid.apple.com → App-Specific Passwords
#   APPLE_TEAM_ID           — 10-char team id from developer.apple.com
#
# `npm run dist:mac` will sign + notarize + staple. Output lands at
# release/Veronum-${version}-mac.dmg (universal arm64+x64).

appId: com.veronum.desktop
productName: Veronum
copyright: Copyright © 2026 Veronum

# Notarize via the afterSign hook (submits + staples via the
# veronum-notary keychain profile). mac.notarize is false below so
# electron-builder doesn't ALSO run its own env-based notarization.
afterSign: scripts/notarize-afterSign.js

directories:
  buildResources: build
  output: release

files:
  - "out/**/*"
  - "package.json"
  - "!**/*.{md,map,ts}"

# Thin wrapper: the app loads the LIVE site (thetoolswebsite.com/app), so
# there's no bundled Next server to ship — just the Electron main + preload
# in the asar. Same Veronum you run in dev, packaged + signed.
asar: true

mac:
  category: public.app-category.developer-tools
  target:
    # dmg = what users download the first time.
    # zip = what electron-updater downloads to apply updates in place.
    #       macOS auto-update CANNOT work from a dmg alone — the zip is
    #       required, and electron-builder generates latest-mac.yml from it.
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
  # `identity: null` skips signing in CI without a cert; set it via env
  # CSC_NAME or leave undefined to auto-detect the Developer ID cert in
  # the user's Keychain. electron-builder picks the right one when the
  # name is omitted.

dmg:
  title: ${productName} ${version}
  icon: build/icon.icns
  iconSize: 100
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows. Cross-built on a Windows CI runner (no Wine on the Mac dev box).
# Unsigned for now — first-launch shows a SmartScreen notice until we add a
# code-signing cert. electron-builder derives the .ico from build/icon.png.
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
  # Version-less name so /releases/latest/download/Veronum-Setup.exe always
  # resolves to the newest installer.
  artifactName: ${productName}-Setup.${ext}

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false

# Update feed. electron-builder uploads the dmg, zip, blockmap and a
# generated latest-mac.yml to GitHub Releases on `--publish`, and the
# packaged app reads this same config (baked in as app-update.yml) to know
# where to check. owner/repo must be a repo you can push releases to and
# must be DISTINCT from veronum-bridge (different appId — sharing a feed
# would cross the two apps' update streams).
publish:
  provider: github
  owner: DylanWain
  repo: veronum-desktop
  releaseType: release
